<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us API Test</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            padding: 40px;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }

        .required {
            color: #e74c3c;
        }

        input,
        textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        input:focus,
        textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 120px;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .response {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            display: none;
        }

        .response.success {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
        }

        .response.error {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
        }

        .response h3 {
            margin-bottom: 10px;
            font-size: 16px;
        }

        .response ul {
            margin-left: 20px;
        }

        .response li {
            margin-bottom: 5px;
        }

        .char-count {
            font-size: 12px;
            color: #999;
            text-align: right;
            margin-top: 5px;
        }

        @media (max-width: 600px) {
            .container {
                padding: 30px 20px;
            }

            h1 {
                font-size: 24px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>📧 Contact Us API Test</h1>
        <p class="subtitle">Test the Contact Us API endpoint</p>

        <form id="contact-form">
            <div class="form-group">
                <label for="name">Name <span class="required">*</span></label>
                <input type="text" id="name" name="name" required maxlength="100" placeholder="Enter your full name">
                <div class="char-count"><span id="name-count">0</span>/100</div>
            </div>

            <div class="form-group">
                <label for="email">Email <span class="required">*</span></label>
                <input type="email" id="email" name="email" required maxlength="150"
                    placeholder="your.email@example.com">
                <div class="char-count"><span id="email-count">0</span>/150</div>
            </div>

            <div class="form-group">
                <label for="phone">Phone Number</label>
                <input type="tel" id="phone" name="phone_number" maxlength="20" placeholder="+1234567890">
                <div class="char-count"><span id="phone-count">0</span>/20</div>
            </div>

            <div class="form-group">
                <label for="subject">Subject</label>
                <input type="text" id="subject" name="subject" maxlength="200" placeholder="What is this about?">
                <div class="char-count"><span id="subject-count">0</span>/200</div>
            </div>

            <div class="form-group">
                <label for="message">Message <span class="required">*</span></label>
                <textarea id="message" name="message" required placeholder="Enter your message here..."></textarea>
                <div class="char-count"><span id="message-count">0</span> characters</div>
            </div>

            <button type="submit" id="submit-btn">Send Message</button>
        </form>

        <div id="response" class="response"></div>
    </div>

    <script>
        // Character counters
        const fields = ['name', 'email', 'phone', 'subject', 'message'];
        fields.forEach(field => {
            const input = document.getElementById(field);
            const counter = document.getElementById(`${field}-count`);

            if (input && counter) {
                input.addEventListener('input', () => {
                    counter.textContent = input.value.length;
                });
            }
        });

        // Form submission
        document.getElementById('contact-form').addEventListener('submit', async function (e) {
            e.preventDefault();

            const submitBtn = document.getElementById('submit-btn');
            const responseDiv = document.getElementById('response');

            // Disable submit button
            submitBtn.disabled = true;
            submitBtn.textContent = 'Sending...';

            // Hide previous response
            responseDiv.style.display = 'none';

            // Collect form data
            const formData = {
                name: document.getElementById('name').value.trim(),
                email: document.getElementById('email').value.trim(),
                phone_number: document.getElementById('phone').value.trim(),
                subject: document.getElementById('subject').value.trim(),
                message: document.getElementById('message').value.trim()
            };

            try {
                const response = await fetch('AllfrontentApi/contactUs.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(formData)
                });

                const result = await response.json();

                // Display response
                responseDiv.style.display = 'block';

                if (result.success) {
                    responseDiv.className = 'response success';
                    responseDiv.innerHTML = `
                        <h3>✅ Success!</h3>
                        <p>${result.message}</p>
                        ${result.data ? `<p><strong>Message ID:</strong> ${result.data.id}</p>` : ''}
                    `;

                    // Reset form
                    this.reset();
                    fields.forEach(field => {
                        const counter = document.getElementById(`${field}-count`);
                        if (counter) counter.textContent = '0';
                    });
                } else {
                    responseDiv.className = 'response error';
                    let errorHTML = `<h3>❌ Error</h3><p>${result.message}</p>`;

                    if (result.errors && result.errors.length > 0) {
                        errorHTML += '<ul>';
                        result.errors.forEach(error => {
                            errorHTML += `<li>${error}</li>`;
                        });
                        errorHTML += '</ul>';
                    }

                    responseDiv.innerHTML = errorHTML;
                }

            } catch (error) {
                responseDiv.style.display = 'block';
                responseDiv.className = 'response error';
                responseDiv.innerHTML = `
                    <h3>❌ Network Error</h3>
                    <p>Failed to connect to the API. Please check:</p>
                    <ul>
                        <li>Is the server running?</li>
                        <li>Is the API path correct?</li>
                        <li>Check browser console for details</li>
                    </ul>
                `;
                console.error('Error:', error);
            } finally {
                // Re-enable submit button
                submitBtn.disabled = false;
                submitBtn.textContent = 'Send Message';
            }
        });
    </script>
</body>

</html>
